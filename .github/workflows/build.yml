name: Build

on:
  push:
  pull_request:

jobs:
  windows-msvc:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure MSVC
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DROCKET_ARTIFACTS_DIR="${{ github.workspace }}/build/artifacts"
          -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Dump CTest Log On Failure
        if: failure()
        run: |
          if (Test-Path "build/Testing/Temporary/LastTest.log") {
            Get-Content "build/Testing/Temporary/LastTest.log"
          } else {
            Write-Host "No CTest log found."
          }
